name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install
      - run: npm run build

      - name: Verify dist outputs
        run: |
          test -f packages/sdk/dist/index.js
          test -f packages/sdk/dist/index.d.ts
          test -f packages/agents/dist/index.js
          test -f packages/agents/dist/index.d.ts

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install
      - run: npx tsc -b packages/sdk packages/agents --noEmit
